<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC Details — Invitaciones Digitales</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Jost', sans-serif; font-weight: 300;
    background: #F5F2ED;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 2rem;
  }
 .logo-img {
    width: clamp(180px, 40vw, 280px);
    margin-bottom: 2rem;
    animation: fadeUp 1s ease both;
  }
  .tagline {
    font-size: 0.6rem; letter-spacing: 0.45em; text-transform: uppercase;
    color:#7B4F1E; margin-bottom: 3rem;
    animation: fadeUp 1s 0.2s ease both;
  }
  .desc {
    font-size: 0.82rem; color: #7B4F1E; max-width: 340px;
    line-height: 2; margin-bottom: 3rem;
    animation: fadeUp 1s 0.4s ease both;
  }
  .contact {
    font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: #7B4F1E; border: 1px solid #7B4F1E; padding: 1rem 2.8rem;
    text-decoration: none; transition: all 0.3s;
    animation: fadeUp 1s 0.6s ease both;
    background: transparent;
  }
  .contact:hover { background: #C9A96E; color: #F5F2ED; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <img class="logo-img" src="https://i.imgur.com/ii8smUE.png" alt="SC Details Logo">
  <p class="tagline">Invitaciones Digitales de Boda</p>
  <p class="desc">Creamos invitaciones digitales únicas y personalizadas para el día más especial de tu vida.</p>
  <a href="https://wa.me/5491168465883" class="contact" target="_blank">Contactanos</a>
</body>
</html>
